name: 香港六合彩 Mark Six 分析助手

on:
  schedule:
    - cron: '0 10 * * *'      # 每天北京时间下午 6:00 更新
  workflow_dispatch:

jobs:
  run-marksix:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 更新数据（使用官方 JSON 接口）
        run: python marksix_local.py bootstrap --csv Mark_Six.csv --official-url https://bet.hkjc.com/contentserver/jcbw/cmc/last30draw.json

      - name: 显示最新推荐
        run: python marksix_local.py show
