nname: 香港六合彩 Mark Six 分析助手

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-marksix:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 更新数据（强制重新同步）
        run: python marksix_local.py bootstrap --csv Mark_Six.csv --update

      - name: 显示最新推荐
        run: python marksix_local.py show
