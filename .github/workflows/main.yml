name: 香港六合彩 Mark Six 分析助手

on:
  schedule:
    - cron: '0 15 * * *'      # 北京时间晚上 23:00（开奖后约 1.5 小时，推荐主要时间）
    - cron: '0 16 * * *'      # 北京时间 00:00（凌晨保险）
    - cron: '0 17 * * *'      # 北京时间 01:00（再保险一次）
  workflow_dispatch:          # 手动测试用

jobs:
  run-marksix:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 更新数据（香港官方结果页）
        run: python marksix_local.py bootstrap --csv Mark_Six.csv --official-url https://bet.hkjc.com/en/marksix/results --no-require-continuity

      - name: 显示最新推荐
        run: python marksix_local.py show
