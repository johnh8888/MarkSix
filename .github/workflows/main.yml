name: 香港 Mark Six 分析助手

on:
  schedule:
    - cron: '15 15 * * *'   # 北京时间晚上 23:15（开奖后）
    - cron: '0 16 * * *'    # 凌晨 00:00
    - cron: '0 17 * * *'    # 凌晨 01:00
  workflow_dispatch:

jobs:
  run-marksix:                  # ← 这里必须是 run-marksix
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: pip install requests

            - name: 更新最新开奖数据 (只用稳定第三方)
        run: |
          python marksix_local.py sync \
            --source third_party \
            --third-party-url "https://marksix6.net/index.php?api=1" \
            --third-party-url "https://api3.marksix6.net/lottery_api.php?type=hk" \
            --no-require-continuity

      - name: 显示最新开奖 + 智能推荐
        run: python marksix_local.py show

      - name: 提交更新后的数据库和CSV (可选)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add marksix_local.db Mark_Six.csv
          git commit -m "Auto update Mark Six data $(date)" || echo "No changes"
          git push
        continue-on-error: true